services:
  nas-filemanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-nas-filemanager
    ports:
      - "3000:3000"
    volumes:
      # NASストレージのマウント（.envで環境変数を設定）
      - ${HDD_001_PATH:-E:\}:/data/HDD-001
      - ${HDD_002_PATH:-F:\}:/data/HDD-002
      - ${SSD_001_PATH:-G:\}:/data/SSD-001
      - ${SSD_002_PATH:-H:\}:/data/SSD-002
      # サムネイルキャッシュ（named volume）
      - thumbnail-cache:/cache/thumbnails
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_USERNAME=${AUTH_USERNAME}
      - AUTH_PASSWORD_HASH=${AUTH_PASSWORD_HASH}

volumes:
  thumbnail-cache:
